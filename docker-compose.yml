services:
  postgres:
    image: postgres:15-alpine
    container_name: bakegrill-postgres
    restart: unless-stopped
    mem_limit: 512m
    environment:
      POSTGRES_DB: bakegrill
      POSTGRES_USER: bakegrill
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set — generate with: openssl rand -base64 32}
    # expose makes the port reachable inside the Docker network but NOT on the host.
    # Use 'ports' only for local dev; in production the DB must not be reachable from outside.
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bakegrill"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bakegrill-network

  redis:
    image: redis:7-alpine
    container_name: bakegrill-redis
    restart: unless-stopped
    mem_limit: 128m
    # expose only — Redis must not be reachable from the host in production.
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bakegrill-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bakegrill-backend
    restart: unless-stopped
    mem_limit: 512m
    cpus: '1.0'
    # php-fpm listens on 9000 inside the container; nginx (or a sidecar) proxies to it.
    # php artisan serve is single-threaded and not suitable for concurrent production traffic.
    expose:
      - "9000"
    volumes:
      - ./backend:/var/www/html
      - ./backend/storage:/var/www/html/storage
    environment:
      - DB_HOST=postgres
      - DB_DATABASE=bakegrill
      - DB_USERNAME=bakegrill
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: php-fpm
    networks:
      - bakegrill-network

  print-proxy:
    build:
      context: ./print-proxy
      dockerfile: Dockerfile
    container_name: bakegrill-print-proxy
    restart: unless-stopped
    mem_limit: 256m
    cpus: '0.5'
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - BIND_HOST=0.0.0.0
      - PRINT_PROXY_KEY=${PRINT_PROXY_KEY:?PRINT_PROXY_KEY must be set — generate with: openssl rand -hex 32}
      - PRINTERS_JSON=${PRINTERS_JSON:-[{"name":"kitchen","host":"192.168.1.50","port":9100}]}
    depends_on:
      - backend
    networks:
      - bakegrill-network

volumes:
  postgres_data:
  redis_data:

networks:
  bakegrill-network:
    driver: bridge
