name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secret-scan:
    name: Secret scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so gitleaks can scan all commits in a PR, not just HEAD
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: true
          GITLEAKS_FAIL_ON_LEAK: "true"

  lint:
    name: Pint (code style)
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run Pint
        working-directory: backend
        run: ./vendor/bin/pint --test

  test:
    name: PHPUnit tests
    runs-on: ubuntu-latest
    needs: lint

    services: {}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: sqlite3, pdo_sqlite
          tools: composer:v2
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Copy .env
        working-directory: backend
        run: cp .env.example .env

      - name: Generate app key
        working-directory: backend
        run: php artisan key:generate

      - name: Run tests
        working-directory: backend
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
          APP_ENV: testing
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
          MAIL_MAILER: array
        run: php artisan test --parallel --stop-on-failure

  frontend:
    name: Frontend type-check & build
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Type-check all apps
        run: npx tsc --noEmit -p apps/online-order-web/tsconfig.json && npx tsc --noEmit -p apps/admin-dashboard/tsconfig.json && npx tsc --noEmit -p apps/pos-web/tsconfig.json && npx tsc --noEmit -p apps/kds-web/tsconfig.json

      - name: Build online-order-web
        run: npm run build --workspace=apps/online-order-web

      - name: Build admin-dashboard
        run: npm run build --workspace=apps/admin-dashboard

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [frontend, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /home/bakeandgrill/test.bakeandgrill.mv \
            && git pull origin main \
            && cd backend \
            && composer install --no-dev --optimize-autoloader \
            && php artisan migrate --force \
            && php artisan config:cache \
            && php artisan route:cache \
            && php artisan view:clear \
            && echo "Deploy complete."

  contract:
    name: API contract tests (snapshot)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: sqlite3, pdo_sqlite
          tools: composer:v2
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Copy .env
        working-directory: backend
        run: cp .env.example .env

      - name: Generate app key
        working-directory: backend
        run: php artisan key:generate

      - name: Run contract tests
        working-directory: backend
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
          APP_ENV: testing
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
          MAIL_MAILER: array
          UPDATE_SNAPSHOTS: "false"
        run: php artisan test --testsuite=Contract --stop-on-failure
